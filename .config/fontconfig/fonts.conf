<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- 默认字体替换 -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>LXGW WenKai</family></prefer>
    <prefer><family>Font Awesome 6 Free</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>LXGW WenKai</family></prefer>
    <prefer><family>Font Awesome 6 Free</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Cascadia Code NF</family></prefer>
    <prefer><family>Font Awesome 6 Free</family></prefer>
  </alias>
</fontconfig>
